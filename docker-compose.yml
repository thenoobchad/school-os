services:
  db:
    image: postgres:15-alpine
    container_name: school_os
    restart: always
    environment:
      POSTGRES_USER: chidi
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - mydb_data:/var/lib/postgresql/data


volumes:
  mydb_data:

